# Secret holds sensitive configuration.
# The key uses the double-underscore convention (ConnectionStrings__DefaultConnection)
# which .NET Configuration maps to ConnectionStrings:DefaultConnection automatically
# when the value is injected as an environment variable.
# This overrides any value from appsettings.json without any code changes.
#
# IMPORTANT: Replace the stringData values before applying to a real cluster,
# or manage them with a secrets manager (e.g., Sealed Secrets, External Secrets Operator).
apiVersion: v1
kind: Secret
metadata:
  name: todo-app-secret
  namespace: dotnet-k8s
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres-service;Port=5432;Database=todos;Username=app;Password=Ch4ng3Me!"
  Postgres__Password: "Ch4ng3Me!"

